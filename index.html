<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a73e8">
<title>Barkod Tarayıcı</title>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f2f5; min-height: 100vh; }

  /* ── SCAN EKRANI ── */
  #scan-screen { display: flex; flex-direction: column; height: 100vh; }

  #header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header h1 { font-size: 20px; font-weight: 700; }
  #header span { font-size: 26px; }

  #camera-wrapper {
    position: relative; flex: 1; background: #000; overflow: hidden;
  }
  #interactive { width: 100%; height: 100%; }
  #interactive video { width: 100% !important; height: 100% !important; object-fit: cover; }
  #interactive canvas { display: none; }

  #scan-line {
    position: absolute; top: 50%; left: 10%; width: 80%; height: 3px;
    background: linear-gradient(90deg, transparent, #ff3d00, transparent);
    border-radius: 2px;
    animation: scanAnim 2s ease-in-out infinite;
    transform: translateY(-50%);
  }
  @keyframes scanAnim {
    0%, 100% { top: 30%; opacity: 1; }
    50% { top: 70%; opacity: 0.7; }
  }

  #scan-frame {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 220px;
    border: 3px solid rgba(255,255,255,0.8);
    border-radius: 16px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  #scan-frame::before, #scan-frame::after,
  #scan-frame span::before, #scan-frame span::after {
    content: ""; position: absolute;
    width: 28px; height: 28px; border-color: #1a73e8; border-style: solid;
  }
  #scan-frame::before  { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-radius: 12px 0 0 0; }
  #scan-frame::after   { top: -3px; right: -3px; border-width: 4px 4px 0 0; border-radius: 0 12px 0 0; }
  #scan-frame span::before { bottom: -3px; left: -3px; border-width: 0 0 4px 4px; border-radius: 0 0 0 12px; }
  #scan-frame span::after  { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-radius: 0 0 12px 0; }

  #status-bar {
    background: #1a73e8; color: white;
    padding: 14px 20px; text-align: center;
    font-size: 15px; font-weight: 500;
    min-height: 52px; display: flex; align-items: center; justify-content: center;
  }
  #status-bar.error { background: #d32f2f; }
  #status-bar.success { background: #2e7d32; }

  /* Manuel giriş */
  #manual-row {
    background: white; padding: 12px 16px;
    display: flex; gap: 8px; align-items: center;
    border-top: 1px solid #e0e0e0;
  }
  #manual-input {
    flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0;
    border-radius: 10px; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  #manual-input:focus { border-color: #1a73e8; }
  #manual-btn {
    background: #1a73e8; color: white; border: none;
    padding: 10px 18px; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* ── SONUÇ EKRANI ── */
  #result-screen {
    display: none; flex-direction: column;
    min-height: 100vh; background: #f0f2f5;
  }
  #result-header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #back-btn {
    background: rgba(255,255,255,0.2); border: none; color: white;
    padding: 8px 14px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  #result-header h2 { font-size: 18px; font-weight: 700; }

  #product-card {
    margin: 20px 16px; background: white;
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  #product-img-wrap {
    background: #f8f9fa; display: flex;
    align-items: center; justify-content: center;
    height: 260px; overflow: hidden;
  }
  #product-img {
    max-width: 100%; max-height: 260px;
    object-fit: contain;
  }
  #no-img {
    font-size: 72px; display: none;
  }
  #product-info { padding: 20px 24px 24px; }
  #product-name {
    font-size: 20px; font-weight: 700;
    color: #1a1a1a; line-height: 1.4; margin-bottom: 16px;
  }
  #price-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border: 2px solid #4caf50; border-radius: 12px;
    padding: 10px 18px; margin-bottom: 16px;
  }
  #price-badge .label { font-size: 13px; color: #388e3c; font-weight: 500; }
  #price-badge .amount { font-size: 28px; font-weight: 800; color: #1b5e20; }
  #barcode-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #f5f5f5; border-radius: 20px;
    padding: 6px 14px; font-size: 13px; color: #666;
  }

  #scan-again-btn {
    margin: 0 16px 24px; padding: 16px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 14px rgba(26,115,232,0.4);
    width: calc(100% - 32px);
  }

  /* Yükleniyor */
  #loading {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; display: none;
  }
  .spinner {
    width: 48px; height: 48px; border: 5px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TARAMA EKRANI -->
<div id="scan-screen">
  <div id="header">
    <span>📦</span>
    <h1>Barkod Tarayıcı</h1>
  </div>

  <div id="camera-wrapper">
    <div id="interactive"></div>
    <div id="scan-frame"><span></span></div>
    <div id="scan-line"></div>
  </div>

  <div id="status-bar" id="status">📷 Kamerayı barkoda tutun</div>

  <div id="manual-row">
    <input id="manual-input" type="text" inputmode="numeric"
           placeholder="Barkod numarası girin..." />
    <button id="manual-btn">Ara</button>
  </div>
</div>

<!-- SONUÇ EKRANI -->
<div id="result-screen">
  <div id="result-header">
    <button id="back-btn">← Geri</button>
    <h2>Ürün Detayı</h2>
  </div>

  <div id="product-card">
    <div id="product-img-wrap">
      <img id="product-img" src="" alt="Ürün fotoğrafı" />
      <div id="no-img">📦</div>
    </div>
    <div id="product-info">
      <div id="product-name"></div>
      <div id="price-badge">
        <span class="label">Fiyat</span>
        <span class="amount" id="price-amount"></span>
      </div><br>
      <div id="barcode-chip">🔖 <span id="barcode-text"></span></div>
    </div>
  </div>

  <button id="scan-again-btn">📷 Tekrar Tara</button>
</div>

<div id="loading"><div class="spinner"></div></div>

// ── Elemanlar ──
const scanScreen   = document.getElementById("scan-screen");
const resultScreen = document.getElementById("result-screen");
const statusBar    = document.getElementById("status-bar");
const manualInput  = document.getElementById("manual-input");
const loading      = document.getElementById("loading");

let scanning = false;

// ── Quagga kamera ──
function startScanner() {
  scanning = false;
  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById("interactive"),
      constraints: { facingMode: "environment", width: 1280, height: 720 }
    },
    decoder: {
      readers: ["ean_reader","ean_8_reader","code_128_reader",
                "code_39_reader","upc_reader","upc_e_reader"]
    },
    locate: true
  }, err => {
    if (err) {
      statusBar.textContent = "⚠️ Kamera açılamadı — Manuel giriş kullanın";
      statusBar.className = "error";
      return;
    }
    Quagga.start();
    scanning = true;
    statusBar.textContent = "📷 Kamerayı barkoda tutun";
    statusBar.className = "";
  });

  Quagga.onDetected(data => {
    if (!scanning) return;
    const code = data.codeResult.code;
    handleBarcode(code);
  });
}

function stopScanner() {
  try { Quagga.stop(); } catch(e) {}
  scanning = false;
}

// ── Barkod işle ──
function handleBarcode(code) {
  scanning = false;
  const product = PRODUCTS[code.trim()];
  if (product) {
    showResult(product);
  } else {
    statusBar.textContent = "❌ Bulunamadı: " + code;
    statusBar.className = "error";
    setTimeout(() => {
      statusBar.textContent = "📷 Kamerayı barkoda tutun";
      statusBar.className = "";
      scanning = true;
    }, 2500);
  }
}

// ── Sonuç göster ──
function showResult(product) {
  stopScanner();
  scanScreen.style.display = "none";
  resultScreen.style.display = "flex";
  resultScreen.style.flexDirection = "column";

  document.getElementById("product-name").textContent = product.name || "";

  const price = product.price;
  document.getElementById("price-amount").textContent =
    price ? "₺" + parseInt(price).toLocaleString("tr-TR") : "Fiyat yok";

  document.getElementById("barcode-text").textContent = product.barcode || "";

  const img = document.getElementById("product-img");
  const noImg = document.getElementById("no-img");
  if (product.image) {
    img.src = "data:image/png;base64," + product.image;
    img.style.display = "block";
    noImg.style.display = "none";
  } else {
    img.style.display = "none";
    noImg.style.display = "block";
  }
}

// ── Geri dön ──
function goBack() {
  resultScreen.style.display = "none";
  scanScreen.style.display = "flex";
  scanScreen.style.flexDirection = "column";
  startScanner();
}

document.getElementById("back-btn").onclick = goBack;
document.getElementById("scan-again-btn").onclick = goBack;

// ── Manuel giriş ──
manualInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const val = manualInput.value.trim();
    if (val) { handleBarcode(val); manualInput.value = ""; }
  }
});
document.getElementById("manual-btn").onclick = () => {
  const val = manualInput.value.trim();
  if (val) { handleBarcode(val); manualInput.value = ""; }
};

// ── Başlat ──
startScanner();
</script>
